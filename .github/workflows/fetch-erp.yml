name: Fetch ERP Viditec

on:
  schedule:
    - cron: '0 6 * * *'  # Todos los dias a las 6:00 AM UTC
  workflow_dispatch:       # Permite ejecutarlo manualmente desde GitHub

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repositorio
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Instalar dependencias
        run: npm install

      - name: Ejecutar script de extraccion
        run: node fetch-all.js

      - name: Subir JSONs generados como artefactos
        uses: actions/upload-artifact@v4
        with:
          name: erp-data-${{ github.run_id }}
          path: '*.json'
          retention-days: 7
